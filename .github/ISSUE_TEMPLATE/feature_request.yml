name: Feature Request
description: Suggest a new feature or improvement
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem would this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you would like this to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have considered.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: References, mockups, or links to related issues or RFCs.
    validations:
      required: false
