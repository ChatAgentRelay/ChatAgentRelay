name: Bug Report
description: Report a bug in Chat Agent Relay (CAR)
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Environment

  - type: dropdown
    id: bun_version
    attributes:
      label: Bun version
      options:
        - "1.2.x"
        - "1.1.x"
        - "1.0.x"
        - "Other / not sure"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: car_version
    attributes:
      label: CAR version
      options:
        - "main (latest)"
        - "Released version (tag)"
        - "Specific commit"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Logs, screenshots, exact Bun/CAR versions, or anything else that helps.
    validations:
      required: false
